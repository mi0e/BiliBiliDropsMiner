name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release:
        description: '发布到 Release'
        required: true
        type: boolean
        default: false
      tag:
        description: 'Release 版本号 (如 v1.0.0)'
        required: false
        type: string

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE (release mode)
        run: python build.py --release --clean

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bilibili-drops-miner
          path: |
            dist/bilibili-drops-miner-gui.exe
            dist/bilibili-drops-miner-cli.exe
          retention-days: 30

  release:
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: bilibili-drops-miner
          path: dist/

      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=v$(date +%Y%m%d.%H%M%S)" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: ${{ steps.tag.outputs.version }}
          generate_release_notes: true
          files: |
            dist/bilibili-drops-miner-gui.exe
            dist/bilibili-drops-miner-cli.exe
